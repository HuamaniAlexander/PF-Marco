spring.application.name=lenasysabores
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lenasysabores}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

decolecta.api.url=https://api.decolecta.com/v1/reniec/dni
decolecta.api.token=${DECOLECTA_API_TOKEN:}

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_MODEL:gemini-3.5-flash}

server.port=${PORT:8080}
server.address=0.0.0.0
